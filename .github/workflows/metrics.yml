name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: darkoss1
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Casablanca
          config_padding: 6%
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: percentage
          # Custom CSS to kill the pink and match GitHub's black
          extras_css: |
            .terminal { background: #0d1117 !important; box-shadow: none !important; }
            .terminal-header { background: #161b22 !important; }
            .terminal-title { color: #c9d1d9 !important; }
            .command { color: #7ee787 !important; }
