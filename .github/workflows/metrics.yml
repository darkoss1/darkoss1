name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: darkoss1
          filename: github-metrics.svg

          template: terminal
          base: header, activity, community, repositories, metadata

          config_timezone: Africa/Casablanca
          config_padding: 6%
          config_output: svg

          output_action: none

          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: percentage

      - name: Recolor terminal to GitHub dark
        run: |
          SVG="/metrics_renders/github-metrics.svg"

          echo "Colors before:"
          grep -oE '#[0-9a-fA-F]{6}' "$SVG" | sort | uniq -c | sort -nr || true

          perl -0pi -e '
            s/#300a24/#0d1117/gi;
            s/#2c001e/#0d1117/gi;
            s/#4b002b/#0d1117/gi;
            s/#5e0036/#0d1117/gi;
            s/#77216f/#0d1117/gi;
            s/#5E2750/#0d1117/gi;
            s/#772953/#0d1117/gi;

            s/#3c3b37/#161b22/gi;
            s/#403f3a/#161b22/gi;
            s/#2d2d2d/#161b22/gi;

            s/#ffffff/#c9d1d9/gi;
          ' "$SVG"

          cp "$SVG" ./github-metrics.svg

          echo "Colors after:"
          grep -oE '#[0-9a-fA-F]{6}' ./github-metrics.svg | sort | uniq -c | sort -nr || true

      - name: Commit updated metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update GitHub metrics
          file_pattern: github-metrics.svg
