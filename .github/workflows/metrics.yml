name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: darkoss1

          template: terminal
          base: header, activity, community, repositories, metadata

          config_timezone: Africa/Casablanca
          config_padding: 6%

          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: percentage

          extras_css: |
            svg {
              background: #0d1117 !important;
            }

            .terminal {
              background: #0d1117 !important;
              fill: #0d1117 !important;
              box-shadow: none !important;
            }

            .terminal-body,
            .terminal-content,
            .window,
            .window-body {
              background: #0d1117 !important;
              fill: #0d1117 !important;
              box-shadow: none !important;
            }

            foreignObject,
            foreignObject > div,
            foreignObject section,
            foreignObject article,
            foreignObject main,
            foreignObject pre {
              background: #0d1117 !important;
            }

            rect[fill="#300a24"],
            rect[fill="#2c001e"],
            rect[fill="#4b002b"],
            rect[fill="#5e0036"],
            rect[fill="#77216f"],
            rect[fill="#5E2750"],
            rect[fill="#772953"] {
              fill: #0d1117 !important;
            }

            .terminal-header,
            .window-header {
              background: #161b22 !important;
              fill: #161b22 !important;
            }

            .terminal-title {
              color: #c9d1d9 !important;
              fill: #c9d1d9 !important;
            }

            .command {
              color: #7ee787 !important;
              fill: #7ee787 !important;
              font-weight: 700 !important;
            }

            text {
              fill: #c9d1d9 !important;
            }
